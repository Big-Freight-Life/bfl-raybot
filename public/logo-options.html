<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rayButler Logo Options</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 40px; }
  h1 { font-size: 1rem; color: #888; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 0.1em; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .option { background: #222; border: 1px solid #333; border-radius: 16px; padding: 40px 32px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .option:hover { border-color: #117680; }
  .label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }
  .logo { display: flex; align-items: center; }

  /* Option A — Bold weight contrast */
  .a .logo { font-size: 1.5rem; font-weight: 300; letter-spacing: -0.02em; }
  .a .logo .accent { color: #117680; font-weight: 700; }
  .a .logo .rest { color: #fff; font-weight: 300; }

  /* Option B — Monospace tech */
  .b .logo { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 1.25rem; font-weight: 500; letter-spacing: 0.02em; }
  .b .logo .accent { color: #117680; }
  .b .logo .rest { color: #fff; }
  .b .logo .dot { color: #117680; }

  /* Option C — Pill badge */
  .c .logo { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em; gap: 0; }
  .c .logo .accent { background: #117680; color: #fff; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
  .c .logo .rest { color: #fff; padding-left: 6px; font-weight: 400; }

  /* Option D — Slash separator */
  .d .logo { font-size: 1.35rem; font-weight: 600; letter-spacing: -0.01em; }
  .d .logo .accent { color: #117680; font-weight: 700; }
  .d .logo .slash { color: #444; font-weight: 300; margin: 0 2px; }
  .d .logo .rest { color: #fff; font-weight: 400; }

  /* Option E — Underline accent */
  .e .logo { font-size: 1.35rem; font-weight: 600; letter-spacing: -0.02em; }
  .e .logo .accent { color: #117680; font-weight: 700; border-bottom: 2px solid #117680; padding-bottom: 2px; }
  .e .logo .rest { color: #fff; font-weight: 400; }

  /* Option F — Stacked with icon */
  .f .logo { flex-direction: column; align-items: flex-start; gap: 2px; }
  .f .logo .top { display: flex; align-items: center; gap: 8px; }
  .f .logo .icon { width: 24px; height: 24px; background: #117680; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; }
  .f .logo .name { font-size: 1.35rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .f .logo .name .teal { color: #117680; }
  .f .logo .tagline { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500; }

  /* Option G — Lowercase minimal */
  .g .logo { font-size: 1.5rem; font-weight: 400; letter-spacing: 0.08em; text-transform: lowercase; }
  .g .logo .accent { color: #117680; font-weight: 600; }
  .g .logo .rest { color: #888; font-weight: 300; }

  /* Option H — Bracket syntax */
  .h .logo { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 1.2rem; font-weight: 400; }
  .h .logo .bracket { color: #444; }
  .h .logo .accent { color: #117680; font-weight: 600; }
  .h .logo .rest { color: #fff; font-weight: 400; }

  /* Option I — Gradient text */
  .i .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .i .logo .gradient { background: linear-gradient(135deg, #117680, #1a9ca8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .i .logo .rest { color: #fff; }
</style>
</head>
<body>
  <h1>rayButler — Logo Options</h1>
  <div class="grid">

    <div class="option a">
      <div class="label">A — Weight Contrast</div>
      <div class="logo"><span class="accent">ray</span><span class="rest">Butler</span></div>
    </div>

    <div class="option b">
      <div class="label">B — Monospace Tech</div>
      <div class="logo"><span class="accent">ray</span><span class="dot">.</span><span class="rest">butler</span></div>
    </div>

    <div class="option c">
      <div class="label">C — Pill Badge</div>
      <div class="logo"><span class="accent">ray</span><span class="rest">Butler</span></div>
    </div>

    <div class="option d">
      <div class="label">D — Slash Separator</div>
      <div class="logo"><span class="accent">ray</span><span class="slash">/</span><span class="rest">Butler</span></div>
    </div>

    <div class="option e">
      <div class="label">E — Underline Accent</div>
      <div class="logo"><span class="accent">ray</span><span class="rest">Butler</span></div>
    </div>

    <div class="option f">
      <div class="label">F — Icon + Stacked</div>
      <div class="logo">
        <div class="top">
          <div class="icon">rB</div>
          <div class="name"><span class="teal">ray</span>Butler</div>
        </div>
      </div>
    </div>

    <div class="option g">
      <div class="label">G — Lowercase Minimal</div>
      <div class="logo"><span class="accent">ray</span><span class="rest">butler</span></div>
    </div>

    <div class="option h">
      <div class="label">H — Bracket Syntax</div>
      <div class="logo"><span class="bracket">{</span><span class="accent">ray</span><span class="rest">Butler</span><span class="bracket">}</span></div>
    </div>

    <div class="option i">
      <div class="label">I — Gradient Bold</div>
      <div class="logo"><span class="gradient">ray</span><span class="rest">Butler</span></div>
    </div>

  </div>
</body>
</html>
